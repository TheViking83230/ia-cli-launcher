<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="440" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252c40"/>
      <stop offset="0.55" stop-color="#161b27"/>
      <stop offset="1" stop-color="#0b0d13"/>
    </linearGradient>
    <linearGradient id="prompt" x1="150" y1="170" x2="370" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="edge" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3c4a63"/>
      <stop offset="1" stop-color="#1b2230"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect x="20" y="20" width="472" height="472" rx="116" fill="url(#bg)" stroke="url(#edge)" stroke-width="8"/>
  <!-- Reflet supérieur subtil -->
  <rect x="40" y="40" width="432" height="220" rx="100" fill="#ffffff" opacity="0.04"/>

  <!-- Prompt terminal (chevron + curseur) avec halo -->
  <g filter="url(#glow)" stroke="url(#prompt)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="158,176 256,260 158,344"/>
    <line x1="284" y1="344" x2="372" y2="344"/>
  </g>

  <!-- Etincelle "IA" -->
  <path d="M388 150 C392 172 398 178 420 182 C398 186 392 192 388 214 C384 192 378 186 356 182 C378 178 384 172 388 150 Z" fill="#a7f3d0"/>
</svg>
